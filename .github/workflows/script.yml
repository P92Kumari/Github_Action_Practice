name: Run Shell Script

on:

  workflow_dispatch:

jobs:
  my-first-script:
    name: Execute Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4



      - name: Give Execute Permission
        run: chmod +x pihu.sh

      - name: Execute Script
        run: ./pihu.sh

      - name: Workflow Completed
        run: echo "Shell script executed successfully!"
